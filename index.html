<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-S3 Realtime Voltage Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .dashboard-card {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 320px;
            border: 1px solid #333;
        }
        h1 {
            font-size: 1.5rem;
            color: #b3b3b3;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .voltage-display {
            font-size: 4rem;
            font-weight: bold;
            color: #00e676;
            margin: 10px 0;
            transition: color 0.5s ease;
        }
        .unit {
            font-size: 2rem;
            color: #00e676;
        }
        .status {
            font-size: 0.9rem;
            color: #888;
            margin-top: 20px;
        }
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #00e676;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: blink 2s infinite;
        }
        @keyframes blink {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h1>Battery Voltage</h1>
        <div class="voltage-display">
            <span id="voltage-val">0.00</span><span class="unit">V</span>
        </div>
        <div class="status">
            <span class="status-dot"></span>Realtime Stream Connected
        </div>
    </div>

    <script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyBxmr6HHUihOqWvT5LYZgwOf0-gSvQSdGk",
    authDomain: "voltgaemonitor.firebaseapp.com",
    projectId: "voltgaemonitor",
    storageBucket: "voltgaemonitor.firebasestorage.app",
    messagingSenderId: "1069914426787",
    appId: "1:1069914426787:web:89587ee09edf1180959e16",
    measurementId: "G-Y5Q5ZRD4PK"
  };

  // Initialize Firebase
  const analytics = getAnalytics(app);

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Reference to your ESP32 database path
        const voltageRef = ref(db, 'voltage_system/current_voltage');

        // Listen for realtime data changes
        const voltageValElement = document.getElementById('voltage-val');
        
        onValue(voltageRef, (snapshot) => {
            const data = snapshot.val();
            if (data !== null) {
                // Update the text on screen dynamically
                voltageValElement.innerText = Number(data).toFixed(2);
                
                // Visual Indicator: Change color to orange if voltage gets low (e.g., under 11V for a 12V battery)
                if (data < 11.0) {
                    voltageValElement.style.color = "#ff9100"; 
                } else {
                    voltageValElement.style.color = "#00e676";
                }
            }
        }, (error) => {
            console.error("Firebase read failed: ", error);
            voltageValElement.innerText = "ERR";
        });
    </script>
</body>
</html>
