<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS // Volt Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0b10;
            --panel-bg: rgba(20, 21, 33, 0.7);
            --border-color: rgba(0, 242, 254, 0.15);
            --cyan-glow: #00f2fe;
            --blue-accent: #4facfe;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --warn-color: #ff9f43;
            --safe-color: #00e676;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 172, 254, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 242, 254, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 4px;
            font-size: 1.8rem;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--cyan-glow), var(--blue-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            width: 100%;
            max-width: 750px;
        }

        .card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--cyan-glow), transparent);
        }

        .card-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
        }

        .btn-export {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            background: linear-gradient(135deg, var(--cyan-glow), var(--blue-accent));
            color: #0a0b10;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            box-shadow: 0 4px 12px rgba(0, 242, 254, 0.25);
            transition: all 0.2s ease;
        }

        .btn-export:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0, 242, 254, 0.4);
        }

        .telemetry-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .voltage-container {
            display: flex;
            align-items: baseline;
        }

        .voltage-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            color: var(--cyan-glow);
            line-height: 1;
            text-shadow: 0 0 30px rgba(0, 242, 254, 0.4);
            transition: color 0.5s ease;
        }

        .unit {
            font-size: 2.2rem;
            font-weight: 500;
            margin-left: 10px;
            color: var(--text-muted);
        }

        .status-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            min-width: 160px;
        }

        .meta-item {
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meta-label { color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;}
        .meta-value { font-weight: 500; }

        .pulse-dot {
            height: 8px;
            width: 8px;
            background-color: var(--safe-color);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--safe-color);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.4; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        .chart-wrapper {
            width: 100%;
            height: 280px;
        }
    </style>
</head>
<body>

    <div class="header-title">NEXUS // TELEMETRY</div>

    <div class="main-grid">
        <div class="card">
            <div class="card-label" style="margin-bottom: 15px;">Realtime Input Voltage</div>
            <div class="telemetry-row">
                <div class="voltage-container">
                    <span id="voltage-val">0.00</span><span class="unit">V</span>
                </div>
                
                <div class="status-box">
                    <div class="meta-item">
                        <span class="meta-label">System</span>
                        <span class="meta-value" style="color: var(--safe-color)">Active</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">Gateway</span>
                        <span class="meta-value" id="gateway-status">Syncing...</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">Stream</span>
                        <span class="pulse-dot" id="status-indicator"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header-flex">
                <div class="card-label">Voltage History (20 Samples)</div>
                <button class="btn-export" id="export-btn">Export to CSV</button>
            </div>
            <div class="chart-wrapper">
                <canvas id="voltageChart"></canvas>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxmr6HHUihOqWvT5LYZgwOf0-gSvQSdGk",
            authDomain: "voltgaemonitor.firebaseapp.com",
            databaseURL: "https://voltgaemonitor-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "voltgaemonitor",
            storageBucket: "voltgaemonitor.firebasestorage.app",
            messagingSenderId: "1069914426787",
            appId: "1:1069914426787:web:89587ee09edf1180959e16"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Global data collection cache array for CSV export routine
        let historicalBackupBuffer = [];

        // --- Chart Canvas Init ---
        const ctx = document.getElementById('voltageChart').getContext('2d');
        const voltageChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Voltage Line',
                    data: [],
                    borderColor: '#00f2fe',
                    borderWidth: 3,
                    pointBackgroundColor: '#4facfe',
                    pointBorderColor: '#00f2fe',
                    pointRadius: 4,
                    tension: 0.35,
                    fill: true,
                    backgroundColor: function(context) {
                        const chart = context.chart;
                        const {ctx, chartArea} = chart;
                        if (!chartArea) return null;
                        const gradient = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
                        gradient.addColorStop(0, 'rgba(0, 242, 254, 0.25)');
                        gradient.addColorStop(1, 'rgba(0, 242, 254, 0.0)');
                        return gradient;
                    }
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        grid: { color: 'rgba(255, 255, 255, 0.03)', drawTicks: false },
                        ticks: { color: '#64748b', font: { family: 'Space Grotesk' } }
                    },
                    y: {
                        min: 0,
                        max: 20, 
                        grid: { color: 'rgba(255, 255, 255, 0.03)', drawTicks: false },
                        ticks: { color: '#64748b', font: { family: 'Space Grotesk' } }
                    }
                }
            }
        });

        // --- Realtime Display Logic ---
        const currentRef = ref(db, 'voltage_system/current_voltage');
        const displayTarget = document.getElementById('voltage-val');
        const gatewayStatus = document.getElementById('gateway-status');
        const statusIndicator = document.getElementById('status-indicator');

        onValue(currentRef, (snapshot) => {
            if(snapshot.exists()) {
                const volts = Number(snapshot.val());
                displayTarget.innerText = volts.toFixed(2);
                gatewayStatus.innerText = "ONLINE";
                gatewayStatus.style.color = "var(--safe-color)";
                statusIndicator.style.backgroundColor = "var(--safe-color)";

                if (volts < 11.0) {
                    displayTarget.style.color = "var(--warn-color)";
                    displayTarget.style.textShadow = "0 0 30px rgba(255, 159, 67, 0.4)";
                } else {
                    displayTarget.style.color = "var(--cyan-glow)";
                    displayTarget.style.textShadow = "0 0 30px rgba(0, 242, 254, 0.4)";
                }
            }
        });

        // --- Historical Node Subscriptions & Timestamp Parser ---
        const historyRef = query(ref(db, 'voltage_system/history'), limitToLast(20));
        onValue(historyRef, (snapshot) => {
            const timeLabels = [];
            const dataPoints = [];
            historicalBackupBuffer = []; // Clear array for incoming fresh set

            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const record = childSnapshot.val();
                    dataPoints.push(record.voltage);
                    
                    // Safe conversion wrapper fallback for different timestamp styles
                    let formatTime;
                    if (record.timestamp) {
                        formatTime = new Date(record.timestamp);
                    } else {
                        formatTime = new Date(); // Fallback if record structure mismatch
                    }

                    // Build readable clock labels
                    const timeString = isNaN(formatTime.getTime()) ? "??:??" : formatTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    timeLabels.push(timeString);

                    // Push objects directly into our exportable array
                    historicalBackupBuffer.push({
                        Timestamp: isNaN(formatTime.getTime()) ? new Date().toISOString() : formatTime.toISOString(),
                        Voltage: record.voltage
                    });
                });

                voltageChart.data.labels = timeLabels;
                voltageChart.data.datasets[0].data = dataPoints;
                voltageChart.update();
            }
        });

        // --- CSV Generation Engine ---
        document.getElementById('export-btn').addEventListener('click', () => {
            if (historicalBackupBuffer.length === 0) {
                alert("No telemetry data found in buffer matrix yet. Ensure your ESP32-S3 is logging to /voltage_system/history");
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,Timestamp,Voltage_V\n";
            historicalBackupBuffer.forEach((row) => {
                csvContent += `${row.Timestamp},${row.Voltage}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Volt_Data_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
