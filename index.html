<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-S3 Advanced Telemetry Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f0f12;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .dashboard-container {
            background-color: #16161a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            text-align: center;
            width: 100%;
            max-width: 600px;
            border: 1px solid #24242b;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .voltage-frame {
            font-size: 4rem;
            font-weight: 700;
            color: #10b981;
            margin-bottom: 10px;
        }
        .unit-symbol { font-size: 1.8rem; color: inherit; }
        .chart-container {
            background-color: #16161a;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 600px;
            border: 1px solid #24242b;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>Live Voltage Node</h1>
        <div class="voltage-frame">
            <span id="voltage-val">0.00</span><span class="unit-symbol">V</span>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="voltageChart"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxmr6HHUihOqWvT5LYZgwOf0-gSvQSdGk",
            authDomain: "voltgaemonitor.firebaseapp.com",
            databaseURL: "https://voltgaemonitor-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "voltgaemonitor",
            storageBucket: "voltgaemonitor.firebasestorage.app",
            messagingSenderId: "1069914426787",
            appId: "1:1069914426787:web:89587ee09edf1180959e16"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- Chart Setup ---
        const ctx = document.getElementById('voltageChart').getContext('2d');
        const voltageChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Timestamps populated dynamically
                datasets: [{
                    label: 'Voltage Timeline',
                    data: [],
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: { grid: { color: '#24242b' }, ticks: { color: '#94a3b8' } },
                    y: { min: 0, max: 25, grid: { color: '#24242b' }, ticks: { color: '#94a3b8' } }
                }
            }
        });

        // --- Realtime Counter Component ---
        const currentRef = ref(db, 'voltage_system/current_voltage');
        const displayTarget = document.getElementById('voltage-val');
        onValue(currentRef, (snapshot) => {
            if(snapshot.exists()) {
                displayTarget.innerText = Number(snapshot.val()).toFixed(2);
            }
        });

        // --- Historical Graph Pipeline ---
        // Query limits view window viewport to the latest 20 telemetry array objects
        const historyRef = query(ref(db, 'voltage_system/history'), limitToLast(20));
        onValue(historyRef, (snapshot) => {
            const labelsArray = [];
            const dataArray = [];
            
            snapshot.forEach((childSnapshot) => {
                const childData = childSnapshot.val();
                dataArray.push(childData.voltage);
                
                // Formulate legible time layout strings from milliseconds
                const date = new Date(childData.timestamp);
                const timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                labelsArray.push(timeString);
            });

            // Re-render chart dataset fields
            voltageChart.data.labels = labelsArray;
            voltageChart.data.datasets[0].data = dataArray;
            voltageChart.update();
        });
    </script>
</body>
</html>
